# front/nginx.conf

server {
  listen 80;
  server_name localhost;

  # Define a pasta raiz para os arquivos estáticos do front-end
  root /usr/share/nginx/html;
  index index.html;

  # Configuração para lidar com o roteamento do React
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Redireciona as chamadas da API para o serviço de backend
  location ~ ^/(token|funcionarios|admin|clinicas|consultas|notificar|sintomas) {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}