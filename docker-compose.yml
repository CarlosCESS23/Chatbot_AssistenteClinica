# docker-compose.yml

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: back/Dockerfile
    volumes:
      - db_data:/data
    env_file:
      - .env
    networks:
      - app-network

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

  chatbot:
    build:
      # --- CORREÇÃO AQUI ---
      context: .
      dockerfile: chatbot/Dockerfile # O caminho e o nome foram corrigidos
    volumes:
      - db_data:/data
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge